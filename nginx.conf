limit_req_zone $binary_remote_addr zone=proxy_app:10m rate=60r/m;

# HTTP → HTTPS редирект
server {
    listen 80;
    server_name 2.56.179.223;

    # Нужен certbot для Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 2.56.179.223;

    # Пути к сертификатам:
    # - Let's Encrypt (домен): /etc/letsencrypt/live/yourdomain.com/
    # - Самоподписанный (IP):  /etc/ssl/proxy-app/
    ssl_certificate     /etc/ssl/proxy-app/cert.pem;
    ssl_certificate_key /etc/ssl/proxy-app/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    location /api/ {
        limit_req zone=proxy_app burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8008;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location / {
        limit_req zone=proxy_app burst=30 nodelay;
        proxy_pass         http://127.0.0.1:8008;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
<script>
    async function loadNextMarketPage() {
        if (!marketState.hasMore || marketState.isLoading) return;
        marketState.isLoading = true;

        const statusEl = document.getElementById('market-status');
        if (statusEl) statusEl.innerHTML = '<span class="animate-pulse">ЗАГРУЗКА...</span>';

        try {
            const search = document.getElementById('country-search').value.trim() || '';
            const params = new URLSearchParams({limit: 20})

            if (search){
                params.set('search', search);
            } else if (marketState.nextCursor != null) {
                params.append('last_id', marketState.nextCursor);
            }

            const response = await fetch(`/api/v1/user/countries?${params}`, {
                headers: {'X-TG-Init-Data': TG_INIT}
            });

            if (!response.ok) throw new Error('Ошибка сервера: ' + response.status);
            const data = await response.json();
            renderMarketItems(data.items || []);

            if (search) {
                marketState.hasMore = false;
                marketState.nextCursor = null;
            } else {
                marketState.nextCursor = data.next_cursor;
                marketState.hasMore = data.has_more;
            }

            if (statusEl) {
                if ((data.items || []).length === 0 && !marketState.nextCursor) {
                    statusEl.innerHTML = '<span class="text-gray-300">РЕГИОНЫ НЕ НАЙДЕНЫ</span>';
                } else {
                    statusEl.innerText = marketState.hasMore ? 'ЛИСТАЙТЕ ВНИЗ' : 'ВСЕ РЕГИОНЫ ЗАГРУЖЕНЫ';
                }
            }
        } catch(e) {
            if (statusEl) statusEl.innerHTML = '<span class="text-red-500">ОШИБКА ЗАГРУЗКИ</span>';
            marketState.isLoading = false;
        } finally {
            marketState.isLoading = false;
        }
    }

    function renderMarketItems(items) {
        const container = document.getElementById('countries-container');
        if (!container) return;

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'w-full flex shrink-0 items-center justify-between p-3 border-2 border-black bg-white hover:bg-zinc-50 active:scale-[0.98] transition-all cursor-pointer';

            const cc = (item.country_code || 'un').toLowerCase();
            const name = item.country || 'Unknown';
            const ver = item.ip_version || 'IPv4';
            const type = (item.ip_type || 'STATIC').replace(/_/g, ' ');
            const price = item.retail_price !== undefined ? parseFloat(item.retail_price).toFixed(2) : '0.00';

            card.onclick = () => openDurationModal(item.area_id);
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="https://flagcdn.com/w40/${cc}.png"
                            class="w-6 h-4 border border-black object-cover shrink-0"
                            onerror="this.src='https://placehold.co/40x30?text=?'">
                        <div class="flex flex-col min-w-0">
                            <span class="text-[11px] font-black uppercase leading-none truncate">${name}</span>
                            <span class="text-[8px] font-bold text-gray-400 uppercase mt-0.5">${ver} · ${type}</span>
                        </div>
                    </div>
                    <div class="text-[12px] font-black tracking-tighter shrink-0 ml-2">${price} <span class="text-[8px]">USD</span></div>
                `;
                container.appendChild(card);
        });
    }
</script>

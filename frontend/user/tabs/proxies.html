<div id="extend-success-modal" class="modal-overlay hidden fixed inset-0 bg-black/70 z-[90] flex items-center justify-center p-4">
    <div class="bg-white border-4 border-black w-full max-w-sm shadow-[12px_12px_0px_0px_rgba(0,0,0,1)]">
        <div class="bg-black text-white p-4 text-center">
            <div class="text-3xl font-black mb-1">UP</div>
            <div class="text-[10px] font-black tracking-widest">ПРОКСИ ПРОДЛЕНЫ</div>
        </div>
        <div class="p-6 space-y-3">
            <div id="extend-success-info" class="text-[10px] font-bold text-gray-600 space-y-1 border-2 border-black p-3 bg-zinc-50"></div>
            <button onclick="smartCloseModal('extend-success-modal')"
                class="w-full bg-black text-white py-3 text-[10px] font-black hover:invert transition-all">
                ЗАКРЫТЬ
            </button>
        </div>
    </div>
</div>

<script src="/static/js/proxies.js"></script>

<script>
let proxyListState = { nextCursor: null, hasMore: true, isLoading: false };
let _selectedProxyIds = new Set();
let _selectionMode = false;

const USER_PROXIES_API = '/api/v1/user/proxies';

async function resetAndReloadProxies() {
    proxyListState = { nextCursor: null, hasMore: true, isLoading: false };
    clearProxySelection();
    const container = document.getElementById('user-proxies-container');
    if (container) container.innerHTML = '';

    await loadNextProxyPage();
}

async function loadNextProxyPage() {
    if (!proxyListState.hasMore || proxyListState.isLoading) return;

    proxyListState.isLoading = true;

    const statusEl = document.getElementById('user-proxies-status');
    if (statusEl) statusEl.innerHTML = '<span class="animate-pulse">ЗАГРУЗКА...</span>';

    try {
        const search = document.getElementById('proxy-search')?.value.trim() || '';

        const params = new URLSearchParams({ limit: 20 });

        if (proxyListState.nextCursor != null) {
            params.append('last_id', proxyListState.nextCursor);
        }

        if (search) params.append('search', search);

        if (status === 'active') params.append('expired', 'false');
        if (status === 'expired') params.append('expired', 'true');

        const res = await fetch(`${USER_PROXIES_API}?${params.toString()}`, {
            headers: { 'X-TG-Init-Data': TG_INIT }
        });

        if (!res.ok) throw new Error(res.status);

        const data = await res.json();
        const items = Array.isArray(data.items) ? data.items : [];

        renderProxyItems(items);

        proxyListState.nextCursor = data.next_cursor ?? null;
        proxyListState.hasMore = Boolean(data.has_more && data.next_cursor != null);

        const isFirstPage = !proxyListState.nextCursor && items.length === 0;
        const hasFilters = Boolean(search !== 'all');

        if (statusEl) {
            if (items.length === 0 && isFirstPage) {
                statusEl.innerHTML = hasFilters
                    ? '<span class="text-gray-300">ПРОКСИ НЕ НАЙДЕНЫ</span>'
                    : '<span class="text-gray-300">У ВАС ЕЩЕ НЕТ ПРОКСИ</span>';
            } else {
                statusEl.innerText = proxyListState.hasMore
                    ? 'ЛИСТАЙТЕ ВНИЗ'
                    : 'ВСЕ ПРОКСИ ЗАГРУЖЕНЫ';
            }
        }
    } catch (e) {
        const statusEl = document.getElementById('user-proxies-status');
        if (statusEl) {
            statusEl.innerHTML = '<span class="text-red-500">ОШИБКА ЗАГРУЗКИ</span>';
        }
    } finally {
        proxyListState.isLoading = false;
    }
}

function renderProxyItems(items) {
    const container = document.getElementById('user-proxies-container');
    if (!container) return;

    const now = new Date();

    items.forEach(p => {
        const isActive = p.is_active;
        const expiresDate = p.expires_at ? new Date(p.expires_at) : null;
        const daysLeft = expiresDate ? Math.ceil((expiresDate - now) / 86400000) : null;
        
        const isExpired = daysLeft !== null && daysLeft <= 0;
        const isUrgent = daysLeft !== null && daysLeft <= 3 && daysLeft > 0;
        
        let dotColor = 'bg-red-500';
        if (isActive && !isExpired) {
            dotColor = isUrgent ? 'bg-yellow-500' : 'bg-green-500';
        }

        const expiresStr = expiresDate ? expiresDate.toLocaleDateString('ru-RU') : '—';
        const connStr = `${p.type}://${p.host}:${p.port}:${p.username || ''}:${p.password || ''}`;
        const noteHtml = p.note
            ? `<div class="text-[9px] font-mono text-gray-500 italic truncate mt-0.5">📝 ${p.note}</div>`
            : '';

        const el = document.createElement('div');
        el.className = `group border-2 ${isUrgent ? 'border-yellow-500' : (isExpired || !isActive ? 'border-black opacity-80' : 'border-black')} 
                        p-0 bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] cursor-pointer hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all`;

        el.innerHTML = `
            <div class="p-3 flex items-center justify-between gap-3">
                <div class="flex items-center gap-3 min-w-0">
                    <div class="shrink-0" onclick="event.stopPropagation(); toggleProxySelect(${p.id}, event)">
                        <div id="proxy-check-${p.id}" class="w-5 h-5 border-2 border-black flex items-center justify-center transition-all" style="background:#fff;">
                            <span class="text-[10px] font-black hidden proxy-check-icon-${p.id}" style="color:#fff;">✓</span>
                        </div>
                    </div>

                    <div class="min-w-0 cursor-pointer flex-1" onclick="_onProxyCardBodyClick(${p.id}, event)">
                        <div class="flex items-center gap-2">
                            <div class="w-2.5 h-2.5 ${dotColor} border border-black shrink-0 shadow-[1px_1px_0px_0px_rgba(0,0,0,1)]"></div>
                            <span class="text-[12px] font-black truncate tracking-tight font-mono">${p.host}:${p.port}</span>
                        </div>
                        <div class="text-[9px] font-bold text-gray-400 uppercase mt-0.5">
                            ${p.type} · ${(p.ip_type || 'ipv4').replace(/_/g, ' ')}
                        </div>
                        ${noteHtml}
                    </div>
                </div>

                <div class="shrink-0 flex items-center gap-1.5">
                    <img src="https://flagcdn.com/w40/${(p.country_code || 'un').toLowerCase()}.png"
                        class="w-6 h-4 border border-black object-cover shrink-0"
                        onerror="this.src='https://placehold.co/40x30?text=?'">
                    <div class="bg-black text-white px-2 py-1 text-[10px] font-black uppercase italic">
                        ${(p.country_code || '??').toUpperCase()}
                    </div>
                </div>
            </div>

            <div class="border-t border-black/10 mx-3"></div>

            <div class="p-3 pt-2 flex items-center justify-between gap-2 flex-wrap">
                <div class="flex flex-col cursor-pointer" onclick="_onProxyCardBodyClick(${p.id}, event)">
                    <span class="text-[8px] font-black text-gray-400 uppercase leading-none mb-1">Срок действия:</span>
                    <span class="text-[10px] font-black ${isUrgent ? 'text-yellow-600' : (isExpired ? 'text-red-500' : 'text-black')}">
                        ${isExpired ? 'СРОК ИСТЕК' : `${expiresStr} (${daysLeft}д.)`}
                    </span>
                </div>

                <div class="flex items-center gap-2">
                    <!-- Переключатель автопродления -->
                    <span id="ae-saving-${p.id}" class="text-[8px] font-black text-gray-400 hidden">...</span>
                    <button title="Автопродление"
                        id="btn-auto-extend-${p.id}"
                        class="border-2 border-black px-2 py-1.5 text-[9px] font-black transition-all ${p.auto_extend ? 'bg-black text-white' : 'bg-white hover:bg-zinc-100'}">
                        ♻ ${p.auto_extend ? 'АВТО ON' : 'АВТО OFF'}
                    </button>

                    <!-- Копировать строку подключения -->
                    <button onclick="event.stopPropagation(); copyText('${connStr.replace(/'/g, "\\'")}')"
                        title="Копировать строку подключения"
                        class="border-2 border-black px-2 py-1.5 text-[9px] font-black hover:bg-black hover:text-white transition-all">
                        ⧉
                    </button>

                    <button onclick="event.stopPropagation(); openExtendModal([${p.id}])"
                        class="bg-white border-2 border-black px-3 py-1.5 text-[9px] font-black uppercase hover:bg-black hover:text-white transition-all shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-[1px]">
                        + ПРОДЛИТЬ
                    </button>
                </div>
            </div>
        `;

        container.appendChild(el);

        // Привязываем onclick после добавления в DOM — иначе атрибут onclick в шаблоне не обновляется
        const aeBtn = el.querySelector(`#btn-auto-extend-${p.id}`);
        if (aeBtn) {
            aeBtn.onclick = (event) => {
                event.stopPropagation();
                setAutoExtend(p.id, !p.auto_extend);
            };
        }
    });
}

function _onProxyCardBodyClick(proxyId, event) {
    event.stopPropagation();
    if (_selectionMode) {
        toggleProxySelect(proxyId, event);
    } else {
        openProxyDetail(proxyId);
    }
}

function handleProxyCardClick(proxyId, event) {
    if (_selectionMode) {
        toggleProxySelect(proxyId, event);
    } else {
        openProxyDetail(proxyId);
    }
}
 
function toggleProxySelect(proxyId, event) {
    event.stopPropagation();
    const checkBox  = document.getElementById('proxy-check-' + proxyId);
    const checkIcons = document.querySelectorAll('.proxy-check-icon-' + proxyId);
 
    if (_selectedProxyIds.has(proxyId)) {
        _selectedProxyIds.delete(proxyId);
        if (checkBox) { checkBox.style.background = '#fff'; }
        checkIcons.forEach(function(ic) { ic.classList.add('hidden'); });
    } else {
        _selectedProxyIds.add(proxyId);
        if (checkBox) { checkBox.style.background = '#000'; }
        checkIcons.forEach(function(ic) { ic.classList.remove('hidden'); });
    }
 
    _selectionMode = _selectedProxyIds.size > 0;
    _updateSelectionBar();
}
 
function clearProxySelection() {
    _selectedProxyIds.forEach(function(id) {
        var cb = document.getElementById('proxy-check-' + id);
        if (cb) { cb.style.background = '#fff'; }
        document.querySelectorAll('.proxy-check-icon-' + id).forEach(function(ic) { ic.classList.add('hidden'); });
    });
    _selectedProxyIds.clear();
    _selectionMode = false;
    _updateSelectionBar();
}
 
function _updateSelectionBar() {
    var bar     = document.getElementById('user-proxy-selection-bar');
    var countEl = document.getElementById('user-proxy-selection-count');
    if (!bar) return;
    if (_selectedProxyIds.size > 0) {
        bar.classList.remove('hidden');
        if (countEl) countEl.innerText = 'ВЫБРАНО: ' + _selectedProxyIds.size;
    } else {
        bar.classList.add('hidden');
    }
}

function copyText(text) {
    navigator.clipboard.writeText(text).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
    });
}

async function _doSetAutoExtendProxiesTab(proxyId, newValue) {
    const saving = document.getElementById('ae-saving-' + proxyId);
    if (saving) saving.classList.remove('hidden');
    try {
        const res = await fetch(`${USER_PROXIES_API}/${proxyId}/auto-extend`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'X-TG-Init-Data': TG_INIT },
            body: JSON.stringify({ auto_extend: newValue })
        });
        if (!res.ok) throw new Error(res.status);
    } catch (e) {
        window.Telegram?.WebApp?.showAlert?.('ОШИБКА СОХРАНЕНИЯ');
        const opp = newValue ? 'false' : 'true';
        const r = document.querySelector(`input[name="ae_${proxyId}"][value="${opp}"]`);
        if (r) r.checked = true;
    } finally {
        if (saving) saving.classList.add('hidden');
    }
}

async function setAutoExtend(proxyId, newValue) {
    const btn = document.querySelector(`#btn-auto-extend-${proxyId}`);
    const saving = document.getElementById('ae-saving-' + proxyId);

    // 1. Показываем лоадер сразу
    if (saving) saving.classList.remove('hidden');

    try {
        // Если выключаем - просто шлем запрос
        if (!newValue) {
            await _doSetAutoExtendProxiesTab(proxyId, false);
            updateAutoExtendBtnUI(proxyId, false);
            return;
        }

        // Если включаем - запрашиваем цену и открываем модалку
        let monthlyPrice = null;
        const priceRes = await fetch('/api/v1/user/calculate-price', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-TG-Init-Data': TG_INIT },
            body: JSON.stringify({ order_type: 'EXTEND', proxy_ids: [proxyId], days: 30 })
        });

        if (priceRes.ok) {
            const pd = await priceRes.json();
            monthlyPrice = pd.order_price ?? null;
        }

        // Назначаем колбэк для модалки подтверждения
        window._autoExtendConfirmedCallback = async (confirmedProxyId) => {
            await _doSetAutoExtendProxiesTab(confirmedProxyId, true);
            updateAutoExtendBtnUI(confirmedProxyId, true);
            window._autoExtendConfirmedCallback = null;
        };

        if (typeof window.openAutoExtendConfirmModal === 'function') {
            window.openAutoExtendConfirmModal(proxyId, monthlyPrice);
        } else {
            // Если модалки нет, просто активируем
            await _autoExtendConfirmedCallback(proxyId);
        }

    } catch (e) {
        console.error(e);
        window.Telegram?.WebApp?.showAlert?.('ОШИБКА ПРИ ОБРАБОТКЕ');
    } finally {
        if (saving) saving.classList.add('hidden');
    }
}

// Обновление UI кнопки автопродления — включая onclick, чтобы следующий клик был корректным
function updateAutoExtendBtnUI(proxyId, isActive) {
    const btn = document.querySelector(`#btn-auto-extend-${proxyId}`);
    if (!btn) return;

    if (isActive) {
        btn.classList.add('bg-black', 'text-white');
        btn.classList.remove('bg-white', 'hover:bg-zinc-100');
        btn.textContent = `♻ АВТО ON`;
    } else {
        btn.classList.remove('bg-black', 'text-white');
        btn.classList.add('bg-white', 'hover:bg-zinc-100');
        btn.textContent = `♻ АВТО OFF`;
    }

    btn.onclick = (event) => {
        event.stopPropagation();
        setAutoExtend(proxyId, !isActive);
    };
}
</script>

<div id="proxy-detail-modal" class="modal-overlay hidden fixed inset-0 bg-black/70 z-[80] flex items-end justify-center">
    <div class="bg-white border-t-4 border-black w-full max-w-md shadow-[0_-8px_0px_0px_rgba(0,0,0,1)] max-h-[85vh] flex flex-col">
        <div class="bg-black text-white px-4 py-3 flex justify-between items-center shrink-0">
            <span class="text-[10px] font-black tracking-widest">ИНФОРМАЦИЯ О ПРОКСИ</span>
            <button onclick="smartCloseModal('proxy-detail-modal')" class="text-xl font-black leading-none">×</button>
        </div>
        <div id="proxy-detail-body" class="overflow-y-auto no-scrollbar p-4 space-y-4 flex-1">
            <div class="text-center py-10 animate-pulse text-[9px] font-black text-gray-400">ЗАГРУЗКА...</div>
        </div>
    </div>
</div>

<script>
let proxyListState = { nextCursor: null, hasMore: true, isLoading: false };

const USER_PROXIES_API = '/api/v1/user/proxies';

async function resetAndReloadProxies() {
    proxyListState = { nextCursor: null, hasMore: true, isLoading: false };

    const container = document.getElementById('user-proxies-container');
    if (container) container.innerHTML = '';

    await loadNextProxyPage();
}

async function loadNextProxyPage() {
    if (!proxyListState.hasMore || proxyListState.isLoading) return;

    proxyListState.isLoading = true;

    const statusEl = document.getElementById('user-proxies-status');
    if (statusEl) statusEl.innerHTML = '<span class="animate-pulse">ЗАГРУЗКА...</span>';

    try {
        const search = document.getElementById('proxy-search')?.value.trim() || '';
        const country = document.getElementById('proxy-country-filter')?.value || '';
        const status = document.getElementById('proxy-status-filter')?.value || 'all';

        const params = new URLSearchParams({ limit: 20 });

        if (proxyListState.nextCursor != null) {
            params.append('last_id', proxyListState.nextCursor);
        }

        if (search) params.append('search', search);
        if (country) params.append('country_code', country);

        if (status === 'active') params.append('expired', 'false');
        if (status === 'expired') params.append('expired', 'true');

        const res = await fetch(`${USER_PROXIES_API}?${params.toString()}`, {
            headers: { 'X-TG-Init-Data': TG_INIT }
        });

        if (!res.ok) throw new Error(res.status);

        const data = await res.json();
        const items = Array.isArray(data.items) ? data.items : [];

        renderProxyItems(items);

        proxyListState.nextCursor = data.next_cursor ?? null;
        proxyListState.hasMore = Boolean(data.has_more && data.next_cursor != null);

        const isFirstPage = !proxyListState.nextCursor && items.length === 0;
        const hasFilters = Boolean(search || country || status !== 'all');

        if (statusEl) {
            if (items.length === 0 && isFirstPage) {
                statusEl.innerHTML = hasFilters
                    ? '<span class="text-gray-300">ПРОКСИ НЕ НАЙДЕНЫ</span>'
                    : '<span class="text-gray-300">У ВАС ЕЩЕ НЕТ ПРОКСИ</span>';
            } else {
                statusEl.innerText = proxyListState.hasMore
                    ? 'ЛИСТАЙТЕ ВНИЗ'
                    : 'ВСЕ ПРОКСИ ЗАГРУЖЕНЫ';
            }
        }
    } catch (e) {
        const statusEl = document.getElementById('user-proxies-status');
        if (statusEl) {
            statusEl.innerHTML = '<span class="text-red-500">ОШИБКА ЗАГРУЗКИ</span>';
        }
    } finally {
        proxyListState.isLoading = false;
    }
}

function renderProxyItems(items) {
    const container = document.getElementById('user-proxies-container');
    if (!container) return;

    items.forEach(p => {
        const isActive = p.is_active;
        const expiresDate = p.expires_at ? new Date(p.expires_at) : null;
        const now = new Date();

        const daysLeft = expiresDate ? Math.ceil((expiresDate - now) / 86400000) : null;
        const isExpired = daysLeft !== null && daysLeft <= 0;
        const isUrgent = daysLeft !== null && daysLeft <= 3 && daysLeft > 0;
        let dotColor = 'bg-red-500';
        
        if (isActive && !isExpired) {
            if (isUrgent) {
                dotColor = 'bg-yellow-500';
            } else {
                dotColor = 'bg-green-500';
            }
        }

        const expiresStr = expiresDate ? expiresDate.toLocaleDateString('ru-RU') : '—';

        const el = document.createElement('div');
        el.className = `border-2 ${isUrgent ? 'border-yellow-500' : (isExpired || !isActive ? 'border-black opacity-80' : 'border-black')} p-3 bg-white shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] cursor-pointer hover:bg-zinc-50 transition-all`;
        
        el.onclick = () => openProxyDetail(p.id);

        el.innerHTML = `
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2 min-w-0">
                    <div class="w-2.5 h-2.5 ${dotColor} border border-black shrink-0 shadow-[1px_1px_0px_0px_rgba(0,0,0,1)]"></div>
                    <span class="text-[11px] font-black truncate">${p.host}:${p.port}</span>
                </div>
                <span class="text-[9px] font-black text-gray-400 shrink-0 ml-2">${(p.ip_type || '').replace(/_/g, ' ')}</span>
            </div>
            <div class="flex justify-between mt-1 text-[9px] font-bold text-gray-400">
                <span>${(p.country_code || '—').toUpperCase()} · ${p.type || 'socks5'}</span>
                <span class="${isUrgent ? 'text-yellow-600' : (isExpired ? 'text-red-500' : '')}">
                    ${isExpired ? 'ИСТЕК' : `ДО: ${expiresStr} (${daysLeft}д)`}
                </span>
            </div>
        `;

        container.appendChild(el);
    });
}

async function openProxyDetail(proxyId) {
    const body = document.getElementById('proxy-detail-body');

    if (body) {
        body.innerHTML = '<div class="text-center py-10 animate-pulse text-[9px] font-black text-gray-400">ЗАГРУЗКА...</div>';
    }

    document.getElementById('proxy-detail-modal')?.classList.remove('hidden');

    try {
        const res = await fetch(`${USER_PROXIES_API}/${proxyId}`, {
            headers: { 'X-TG-Init-Data': TG_INIT }
        });

        if (!res.ok) throw new Error(res.status);

        renderProxyDetail(body, await res.json());
    } catch (e) {
        if (body) {
            body.innerHTML = '<div class="text-red-500 text-[10px] font-black text-center py-6">ОШИБКА ЗАГРУЗКИ ДАННЫХ</div>';
        }
    }
}

function renderProxyDetail(container, p) {
    if (!container) return;

    const expires = p.expires_at ? new Date(p.expires_at).toLocaleString('ru-RU') : '—';
    const bought = p.purchased_at ? new Date(p.purchased_at).toLocaleString('ru-RU') : '—';
    const connStr = `${p.type || 'socks5'}://${p.username || ''}:${p.password || ''}@${p.host}:${p.port}`;

    container.innerHTML = `
        <div class="border-2 border-black p-3 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] space-y-1">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-black">СОЕДИНЕНИЕ</span>
                <div class="flex items-center gap-1">
                    <div class="w-2 h-2 ${p.is_active ? 'bg-green-500' : 'bg-zinc-300'} border border-black"></div>
                    <span class="text-[9px] font-bold">${p.is_active ? 'АКТИВЕН' : 'НЕАКТИВЕН'}</span>
                </div>
            </div>
            <div class="font-black text-sm tracking-tight">${p.host}:${p.port}</div>
            <div class="text-[9px] text-gray-400 font-bold">${p.type || 'SOCKS5'} · ${p.ip_version || 'IPv4'} · ${(p.ip_type || '').replace(/_/g, ' ')}</div>
        </div>

        <div class="border-2 border-black p-3 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] space-y-1">
            <div class="text-[9px] font-black text-gray-400 mb-1">УЧЁТНЫЕ ДАННЫЕ</div>

            <div class="flex justify-between items-center">
                <span class="text-[9px] font-bold text-gray-400">ЛОГИН</span>
                <div class="flex items-center gap-1">
                    <span class="text-[10px] font-black font-mono normal-case">${p.username || '—'}</span>
                    ${p.username ? `<button onclick="copyText('${String(p.username).replace(/'/g, "\\'")}')" class="text-[7px] border border-black px-1 hover:bg-black hover:text-white transition-all">КОПИР</button>` : ''}
                </div>
            </div>

            <div class="flex justify-between items-center">
                <span class="text-[9px] font-bold text-gray-400">ПАРОЛЬ</span>
                <div class="flex items-center gap-1">
                    <span class="text-[10px] font-black font-mono normal-case" id="pwd-${p.id}">••••••••</span>
                    <button onclick="togglePwd(${p.id}, '${String(p.password || '').replace(/'/g, "\\'")}')" class="text-[7px] border border-black px-1 hover:bg-black hover:text-white transition-all">ПОКАЗ</button>
                    ${p.password ? `<button onclick="copyText('${String(p.password).replace(/'/g, "\\'")}')" class="text-[7px] border border-black px-1 hover:bg-black hover:text-white transition-all">КОПИР</button>` : ''}
                </div>
            </div>
        </div>

        <div class="border-2 border-black p-3">
            <div class="text-[9px] font-black text-gray-400 mb-1">СТРОКА ПОДКЛЮЧЕНИЯ</div>
            <div class="text-[8px] font-mono normal-case bg-zinc-50 p-2 break-all leading-relaxed">${connStr}</div>
            <button onclick="copyText('${connStr.replace(/'/g, "\\'")}')" class="mt-2 w-full border-2 border-black py-2 text-[9px] font-black hover:bg-black hover:text-white transition-all">
                КОПИРОВАТЬ СТРОКУ
            </button>
        </div>

        <div class="border-2 border-black p-3 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] space-y-1">
            <div class="text-[9px] font-black text-gray-400 mb-1">ВРЕМЕННЫЕ МЕТКИ</div>
            <div class="flex justify-between text-[9px]"><span class="font-bold text-gray-400">КУПЛЕНО</span><span class="font-black">${bought}</span></div>
            <div class="flex justify-between text-[9px]"><span class="font-bold text-gray-400">ИСТЕКАЕТ</span><span class="font-black">${expires}</span></div>
            <div class="flex justify-between text-[9px]"><span class="font-bold text-gray-400">РЕГИОН ID</span><span class="font-black">${p.area_id || '—'}</span></div>
        </div>

        <div class="border-2 border-black p-3 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">
            <div class="flex items-center justify-between mb-2">
                <div>
                    <div class="text-[10px] font-black">АВТОПРОДЛЕНИЕ</div>
                    <div class="text-[8px] text-gray-400 font-bold normal-case">Автоматически продлевать по истечении</div>
                </div>
                <span id="ae-saving-${p.id}" class="text-[8px] font-black text-gray-400 hidden">СОХРАНЕНИЕ...</span>
            </div>

            <div class="flex gap-2">
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="ae_${p.id}" value="true"
                        ${p.auto_extend ? 'checked' : ''}
                        onchange="setAutoExtend(${p.id}, true)"
                        class="sr-only peer">
                    <div class="border-2 border-black py-2 text-center text-[9px] font-black transition-all peer-checked:bg-black peer-checked:text-white hover:bg-zinc-100 peer-checked:hover:bg-black">ВКЛ</div>
                </label>

                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="ae_${p.id}" value="false"
                        ${!p.auto_extend ? 'checked' : ''}
                        onchange="setAutoExtend(${p.id}, false)"
                        class="sr-only peer">
                    <div class="border-2 border-black py-2 text-center text-[9px] font-black transition-all peer-checked:bg-black peer-checked:text-white hover:bg-zinc-100 peer-checked:hover:bg-black">ВЫКЛ</div>
                </label>
            </div>
        </div>

        <div class="text-[8px] font-bold text-gray-300 text-center">
            PROXY_ID: ${p.ipfoxy_proxy_id || '—'} · ORDER: ${p.ipfoxy_order_id || '—'}
        </div>
    `;
}

function togglePwd(id, pwd) {
    const el = document.getElementById('pwd-' + id);
    if (el) el.innerText = el.innerText === '••••••••' ? pwd : '••••••••';
}

function copyText(text) {
    navigator.clipboard.writeText(text).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
    });

    window.Telegram?.WebApp?.showAlert?.('Скопировано!');
}

async function setAutoExtend(proxyId, newValue) {
    const saving = document.getElementById('ae-saving-' + proxyId);
    if (saving) saving.classList.remove('hidden');

    try {
        const res = await fetch(`${USER_PROXIES_API}/${proxyId}/auto-extend`, {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
                'X-TG-Init-Data': TG_INIT
            },
            body: JSON.stringify({ auto_extend: newValue })
        });

        if (!res.ok) throw new Error(res.status);
    } catch (e) {
        window.Telegram?.WebApp?.showAlert?.('ОШИБКА СОХРАНЕНИЯ');

        const opp = newValue ? 'false' : 'true';
        const r = document.querySelector(`input[name="ae_${proxyId}"][value="${opp}"]`);
        if (r) r.checked = true;
    } finally {
        if (saving) saving.classList.add('hidden');
    }
}
</script>

<div id="user-layout" class="hidden">

    <!-- Навигация -->
    <nav class="flex border-b-2 border-black bg-white h-12 text-[10px] font-bold uppercase shrink-0">
        <div id="tab-proxies" onclick="switchUserTab('proxies')"
             class="flex-1 flex items-center justify-center border-r border-black bg-black text-white cursor-pointer transition-all">
            МОИ ПРОКСИ
        </div>
        <div id="tab-market" onclick="switchUserTab('market')"
             class="flex-1 flex items-center justify-center cursor-pointer hover:bg-zinc-100 transition-all">
            МАРКЕТ
        </div>
    </nav>

    <div class="p-4 space-y-3">

        <!-- ══ ВКЛАДКА: МОИ ПРОКСИ ══ -->
        <section id="tab-content-proxies">
            <!-- Поиск и фильтры -->
            <div class="space-y-2 mb-3">
                <input type="text" id="proxy-search"
                       placeholder="ПОИСК (IP, HOSTNAME, ORDER ID)..."
                       oninput="debounceProxySearch()"
                       class="w-full bg-white border-2 border-black p-2 text-[10px] font-black uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] focus:translate-x-[2px] focus:translate-y-[2px] focus:shadow-none outline-none transition-all">
                <div class="flex gap-2">
                    <select id="proxy-country-filter" onchange="resetAndReloadProxies()"
                            class="flex-1 bg-white border-2 border-black p-2 text-[10px] font-black uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] outline-none">
                        <option value="">ВСЕ СТРАНЫ</option>
                    </select>
                    <select id="proxy-status-filter" onchange="resetAndReloadProxies()"
                            class="flex-1 bg-white border-2 border-black p-2 text-[10px] font-black uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] outline-none">
                        <option value="all">ВСЕ</option>
                        <option value="active">АКТИВНЫЕ</option>
                        <option value="expired">ИСТЕКШИЕ</option>
                    </select>
                </div>
            </div>

            <!-- Список прокси (контейнер) -->
            <div id="user-proxies-container" class="space-y-3"></div>
            <div id="user-proxies-status" class="py-3 text-center text-[9px] font-black text-gray-400 uppercase"></div>

            <!-- Подключаем логику прокси (БЕЗ дублирования контейнера) -->
            {% include "user/tabs/proxies.html" %}
        </section>

        <!-- ══ ВКЛАДКА: МАРКЕТ ══ -->
        <section id="tab-content-market" class="hidden">
            <!-- Поиск по странам -->
            <div class="mb-3">
                <input type="text" id="country-search"
                       placeholder="НАЙТИ СТРАНУ..."
                       oninput="debounceCountrySearch()"
                       class="w-full bg-white border-2 border-black p-2 text-[10px] font-black uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] focus:translate-x-[2px] focus:translate-y-[2px] focus:shadow-none outline-none transition-all">
            </div>

            <!-- Список стран (контейнер) -->
            <div id="countries-container" class="space-y-3"></div>
            <div id="market-status" class="py-3 text-center text-[9px] font-black text-gray-400 uppercase"></div>

            <!-- Подключаем логику маркета (БЕЗ дублирования контейнера) -->
            {% include "user/tabs/market.html" %}
        </section>

    </div>
</div>

<!-- Модал: успешная покупка -->
<div id="purchase-success-modal" class="modal-overlay hidden fixed inset-0 bg-black/70 z-[90] flex items-center justify-center p-4">
    <div class="bg-white border-4 border-black w-full max-w-sm shadow-[12px_12px_0px_0px_rgba(0,0,0,1)]">
        <div class="bg-black text-white p-4 text-center">
            <div class="text-3xl font-black mb-1">✓</div>
            <div class="text-[10px] font-black tracking-widest">ЗАКАЗ ВЫПОЛНЕН</div>
        </div>
        <div class="p-6 space-y-3">
            <div id="purchase-success-info" class="text-[10px] font-bold text-gray-600 space-y-1 border-2 border-black p-3 bg-zinc-50"></div>
            <button onclick="smartCloseModal('purchase-success-modal'); switchUserTab('proxies');"
                class="w-full bg-black text-white py-3 text-[10px] font-black hover:invert transition-all">
                ПЕРЕЙТИ К ПРОКСИ
            </button>
        </div>
    </div>
</div>

<!-- Модал: ошибка покупки -->
<div id="purchase-error-modal" class="modal-overlay hidden fixed inset-0 bg-black/70 z-[90] flex items-center justify-center p-4">
    <div class="bg-white border-4 border-black w-full max-w-sm shadow-[12px_12px_0px_0px_rgba(0,0,0,1)]">
        <div class="bg-black text-white p-4 text-center">
            <div class="text-3xl font-black mb-1">✕</div>
            <div class="text-[10px] font-black tracking-widest">ОШИБКА ОПЕРАЦИИ</div>
        </div>
        <div class="p-6 space-y-3">
            <div id="purchase-error-info" class="text-[10px] font-bold text-red-600 border-2 border-red-500 p-3 bg-red-50"></div>
            <button onclick="smartCloseModal('purchase-error-modal')"
                class="w-full border-2 border-black py-3 text-[10px] font-black hover:bg-black hover:text-white transition-all">
                ЗАКРЫТЬ
            </button>
        </div>
    </div>
</div>

<script>
let marketState  = { nextCursor: null, hasMore: true, isLoading: false };

let _proxySearchTimeout  = null;
let _countrySearchTimeout = null;

async function initUser() {
    await resetAndReloadProxies();
}

// ── Переключение вкладок ──
function switchUserTab(tab) {
    ['proxies', 'market'].forEach(t => {
        document.getElementById('tab-content-' + t).classList.toggle('hidden', t !== tab);
        const navEl = document.getElementById('tab-' + t);
        navEl.classList.toggle('bg-black',    t === tab);
        navEl.classList.toggle('text-white',  t === tab);
        navEl.classList.toggle('hover:bg-zinc-100', t !== tab);
    });

    if (tab === 'market') {
        const container = document.getElementById('countries-container');
        // Грузим только если контейнер пустой
        if (container && container.children.length === 0) {
            resetAndReloadMarket();
        }
    }
}

// ── Debounce для поиска ──
function debounceProxySearch() {
    clearTimeout(_proxySearchTimeout);
    _proxySearchTimeout = setTimeout(() => resetAndReloadProxies(), 450);
}

function debounceCountrySearch() {
    clearTimeout(_countrySearchTimeout);
    _countrySearchTimeout = setTimeout(() => resetAndReloadMarket(), 400);
}

// ── Сброс и перезагрузка маркета ──
function resetAndReloadMarket() {
    marketState = { nextCursor: null, hasMore: true, isLoading: false };
    const container = document.getElementById('countries-container');
    if (container) container.innerHTML = '';
    loadNextMarketPage(); // определена в market.html
}

// ── Публичные функции покупки ──
function showPurchaseSuccess(orderData) {
    const info = document.getElementById('purchase-success-info');
    if (info) info.innerHTML = `
        <div class="flex justify-between"><span>ЗАКАЗ</span><span class="font-black">#${orderData.order_id}</span></div>
        <div class="flex justify-between"><span>КУПЛЕНО</span><span class="font-black">${orderData.count} ШТ.</span></div>
    `;
    document.getElementById('purchase-success-modal')?.classList.remove('hidden');
    resetAndReloadProxies();
}

function showPurchaseError(message) {
    const info = document.getElementById('purchase-error-info');
    if (info) info.innerText = message;
    document.getElementById('purchase-error-modal')?.classList.remove('hidden');
}
</script>

<div id="duration-modal-overlay" class="modal-overlay fixed inset-0 bg-black/80 z-[100] flex items-end justify-center hidden">
    <div class="bg-white border-t-[3px] border-black w-full max-w-md shadow-[0_-8px_0px_0px_rgba(0,0,0,1)] flex flex-col max-h-[80vh]">

        <div class="border-b-[3px] border-black p-3 bg-white flex justify-between items-center shrink-0">
            <h3 id="modal-title" class="text-sm font-black uppercase tracking-tighter">ВЫБОР ПАРАМЕТРОВ</h3>
            <button onclick="closeDurationModal()" class="hover:bg-black hover:text-white border-2 border-black w-8 h-8 flex items-center justify-center transition-all">
                <span class="text-xl leading-none">×</span>
            </button>
        </div>

        <div class="p-5 overflow-y-auto no-scrollbar">

            <!-- Шаг 1: Срок -->
            <div id="step-duration" class="space-y-4">
                <div class="flex items-center space-x-2">
                    <div class="w-2 h-2 bg-black animate-pulse"></div>
                    <span class="text-[10px] font-black uppercase">УКАЖИТЕ ПЕРИОД (ДНЕЙ):</span>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="selectDuration(30)"  class="border-2 border-black py-3 font-black text-sm hover:bg-black hover:text-white transition-all shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-1 active:translate-y-1">30</button>
                    <button onclick="selectDuration(90)"  class="border-2 border-black py-3 font-black text-sm hover:bg-black hover:text-white transition-all shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-1 active:translate-y-1">90</button>
                    <button onclick="selectDuration(180)" class="border-2 border-black py-3 font-black text-sm hover:bg-black hover:text-white transition-all shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-1 active:translate-y-1">180</button>
                    <button onclick="selectDuration(360)" class="border-2 border-black py-3 font-black text-sm hover:bg-black hover:text-white transition-all shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-1 active:translate-y-1">360</button>
                </div>
            </div>

            <!-- Шаг 2: Количество -->
            <div id="step-quantity" class="hidden space-y-4">
                <div class="flex items-center space-x-2">
                    <div class="w-2 h-2 bg-black"></div>
                    <span class="text-[10px] font-black uppercase">КОЛИЧЕСТВО ЕДИНИЦ (1–100):</span>
                </div>
                <input type="number" id="proxy-quantity" min="1" max="100" value="1"
                       class="border-[3px] border-black p-3 font-black text-lg focus:outline-none focus:bg-zinc-100 w-full">
                <p id="quantity-error" class="hidden text-[9px] text-white bg-red-600 p-1 font-bold text-center uppercase">ДИАПАЗОН: 1–100</p>
                <button onclick="confirmOptions()" class="w-full bg-black text-white py-4 text-sm font-black hover:bg-white hover:text-black border-2 border-black transition-all uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,0.3)]">
                    ПОДТВЕРДИТЬ
                </button>
                <button onclick="goBackToDuration()" class="w-full py-2 text-[10px] font-black uppercase underline decoration-2 underline-offset-4 hover:text-gray-500 transition-colors">
                    « НАЗАД К СРОКУ
                </button>
            </div>

            <!-- Шаг 3: Подтверждение цены -->
            <div id="step-confirm" class="hidden space-y-4">
                <div class="border-[3px] border-black p-4 bg-zinc-50 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-black uppercase">ИТОГО К ОПЛАТЕ:</span>
                        <div class="w-2 h-2 bg-green-500 animate-pulse"></div>
                    </div>
                    <div id="final-price-display" class="text-3xl font-black tracking-tighter">0.00 USD</div>
                    <div class="mt-2 text-[9px] text-gray-500 font-bold uppercase leading-tight">
                        СРОК: <span id="summary-duration">0</span> ДН. &nbsp;|&nbsp; КОЛ-ВО: <span id="summary-quantity">0</span> ШТ.
                    </div>
                </div>
                <button onclick="executePurchase()" id="buy-btn"
                    class="w-full bg-black text-white border-2 border-black py-4 font-black hover:bg-green-600 transition-all uppercase tracking-widest text-sm shadow-[4px_4px_0px_0px_rgba(0,0,0,0.3)]">
                    ОПЛАТИТЬ С БАЛАНСА
                </button>
                <button onclick="goBackToQuantity()" class="w-full py-2 text-[10px] font-black uppercase underline decoration-2 underline-offset-4 hover:text-gray-500 transition-colors">
                    « ИЗМЕНИТЬ ЗАКАЗ
                </button>
            </div>

            <!-- Лоадер -->
            <div id="modal-loader" class="hidden py-10 flex flex-col items-center justify-center space-y-3">
                <div class="w-10 h-10 border-[4px] border-black border-t-transparent animate-spin"></div>
                <span id="loader-text" class="text-[10px] font-black animate-pulse uppercase">РАСЧЁТ СТОИМОСТИ...</span>
            </div>
        </div>

        <div class="bg-black h-1 w-full shrink-0"></div>
    </div>
</div>

<script>
let currentSelection = { areaId: null, duration: null, quantity: 1 };

function openDurationModal(areaId) {
    currentSelection.areaId = areaId;
    resetModal();
    document.getElementById('duration-modal-overlay').classList.remove('hidden');
}

function closeDurationModal() {
    resetModal();
    smartCloseModal('duration-modal-overlay');
}

function resetModal() {
    ['step-duration','step-quantity','step-confirm'].forEach((id, i) => {
        document.getElementById(id).classList.toggle('hidden', i !== 0);
    });
    document.getElementById('modal-loader').classList.add('hidden');
    document.getElementById('modal-title').innerText = 'ВЫБОР ПАРАМЕТРОВ';
    document.getElementById('proxy-quantity').value = 1;
    document.getElementById('quantity-error').classList.add('hidden');
    const btn = document.getElementById('buy-btn');
    if (btn) { btn.disabled = false; btn.innerText = 'ОПЛАТИТЬ С БАЛАНСА'; }
    currentSelection.duration = null;
    currentSelection.quantity = 1;
}

function selectDuration(days) {
    currentSelection.duration = days;
    document.getElementById('step-duration').classList.add('hidden');
    document.getElementById('step-quantity').classList.remove('hidden');
    document.getElementById('modal-title').innerText = 'СРОК: ' + days + ' ДН.';
}

function goBackToDuration() {
    document.getElementById('step-quantity').classList.add('hidden');
    document.getElementById('step-duration').classList.remove('hidden');
    document.getElementById('modal-title').innerText = 'ВЫБОР ПАРАМЕТРОВ';
}

function goBackToQuantity() {
    document.getElementById('step-confirm').classList.add('hidden');
    document.getElementById('step-quantity').classList.remove('hidden');
}

async function confirmOptions() {
    const qty = parseInt(document.getElementById('proxy-quantity').value);
    const errEl = document.getElementById('quantity-error');
    if (isNaN(qty) || qty < 1 || qty > 100) {
        errEl.classList.remove('hidden'); return;
    }
    errEl.classList.add('hidden');
    currentSelection.quantity = qty;

    document.getElementById('step-quantity').classList.add('hidden');
    document.getElementById('modal-loader').classList.remove('hidden');
    document.getElementById('loader-text').innerText = 'РАСЧЁТ СТОИМОСТИ...';

    try {
        const res = await fetch('/api/v1/user/calculate-price', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-TG-Init-Data': TG_INIT },
            body: JSON.stringify({
                order_type: 'BUY',
                days:    currentSelection.duration,
                area_id: currentSelection.areaId,
                num:     currentSelection.quantity
            })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Ошибка сервера');

        document.getElementById('final-price-display').innerText = `${data.order_price} USD`;
        document.getElementById('summary-duration').innerText = currentSelection.duration;
        document.getElementById('summary-quantity').innerText = currentSelection.quantity;
        document.getElementById('modal-loader').classList.add('hidden');
        document.getElementById('step-confirm').classList.remove('hidden');
        document.getElementById('modal-title').innerText = 'ПОДТВЕРЖДЕНИЕ';
    } catch(e) {
        closeDurationModal();
        if (typeof showPurchaseError === 'function') showPurchaseError(e.message);
        else window.Telegram.WebApp.showAlert('Ошибка: ' + e.message);
    }
}

async function executePurchase() {
    const btn = document.getElementById('buy-btn');
    btn.disabled = true;
    btn.innerText = 'ОБРАБОТКА...';
    document.getElementById('step-confirm').classList.add('hidden');
    document.getElementById('modal-loader').classList.remove('hidden');
    document.getElementById('loader-text').innerText = 'ОФОРМЛЕНИЕ ЗАКАЗА...';

    try {
        const res = await fetch('/api/v1/user/purchase-proxy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-TG-Init-Data': TG_INIT },
            body: JSON.stringify({
                area_id: currentSelection.areaId,
                days:    currentSelection.duration,
                num:     currentSelection.quantity
            })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Ошибка при создании заказа');

        closeDurationModal();
        if (typeof showPurchaseSuccess === 'function') showPurchaseSuccess(data);
        fetchUserProfile(true);

        setTimeout(() => {
            if (typeof resetAndReloadProxies === 'function') resetAndReloadProxies();
        }, 60000);
    } catch(e) {
        closeDurationModal();
        if (typeof showPurchaseError === 'function') showPurchaseError(e.message);
        else window.Telegram.WebApp.showAlert('Ошибка: ' + e.message);
    }
}
</script>

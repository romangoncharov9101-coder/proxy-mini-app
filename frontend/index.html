{% extends "base.html" %}
{% block content %}

<div id="page-loader" class="flex flex-col items-center justify-center py-20 space-y-3">
    <div class="w-8 h-8 border-[3px] border-black border-t-transparent animate-spin"></div>
    <span class="text-[9px] font-black animate-pulse tracking-widest">СИНХРОНИЗАЦИЯ ДАННЫХ...</span>
</div>

{% include "user/user_part.html" %}
{% include "admin/admin_part.html" %}

<script>
let CURRENT_ROLE = null;
let CURRENT_USER = null;

function renderInterface(user) {
    CURRENT_ROLE = user.role;
    CURRENT_USER = user;

    document.getElementById('page-loader')?.classList.add('hidden');

    if (user.role === 'admin') {
        document.getElementById('user-layout')?.classList.add('hidden');
        document.getElementById('admin-layout')?.classList.remove('hidden');

        if (typeof initAdmin === 'function') initAdmin();
    } else {
        document.getElementById('admin-layout')?.classList.add('hidden');
        document.getElementById('user-layout')?.classList.remove('hidden');

        if (typeof initUser === 'function') initUser();
    }
}

let _extendProxyIds = [];

function openExtendModal(proxyIds) {
    _extendProxyIds = proxyIds;

    const modal = document.getElementById('days-option-modal');
    if (modal) modal.classList.remove('hidden');
}

async function confirmExtendDays(days) {
    if (!_extendProxyIds.length) return;

    try {
        const res = await fetch('/api/v1/user/proxies/extend', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-TG-Init-Data': TG_INIT },
            body: JSON.stringify({ proxy_ids: _extendProxyIds, days: days })
        });

        if (!res.ok) throw new Error(res.status);

        await res.json();
        smartCloseModal('days-option-modal');
        // resetAndReloadProxies вызывается внутри showExtendSuccess/showPurchaseSuccess
        document.getElementById('extend-success-modal')?.classList.remove('hidden');
    } catch(e) {
        window.Telegram?.WebApp?.showAlert('Ошибка продления');
    }
}

document.getElementById('main-scroll')?.addEventListener('scroll', function() {
    const sc = this;
    const nearBottom = sc.scrollTop + sc.clientHeight >= sc.scrollHeight - 220;
    if (!nearBottom) return;

    if (CURRENT_ROLE === 'user') {
        const marketTab = document.getElementById('tab-content-market');
        if (marketTab && !marketTab.classList.contains('hidden')) {
            if (typeof loadNextMarketPage === 'function') loadNextMarketPage();
            return;
        }

        const proxyTab = document.getElementById('tab-content-proxies');
        if (proxyTab && !proxyTab.classList.contains('hidden')) {
            if (typeof loadNextProxyPage === 'function') loadNextProxyPage();
            return;
        }
    }

    if (CURRENT_ROLE === 'admin') {
        const adminProxies = document.getElementById('admin-proxies-section');
        if (adminProxies && !adminProxies.classList.contains('hidden')) {
            if (typeof loadNextAdminProxiesPage === 'function') loadNextAdminProxiesPage();
            return;
        }

        const adminTx = document.getElementById('admin-tx-section');
        if (adminTx && !adminTx.classList.contains('hidden')) {
            if (typeof loadNextAdminTxPage === 'function') loadNextAdminTxPage();
            return;
        }

        const adminKeys = document.getElementById('admin-keys-section');
        if (adminKeys && !adminKeys.classList.contains('hidden')) {
            if (typeof loadNextUsersPage === 'function') loadNextUsersPage();
            return;
        }
    }
});
</script>

{% include "user/modals/extend_proxy_modal.html" %}

{% endblock %}

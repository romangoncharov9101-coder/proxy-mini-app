<div id="modal-overlay" class="hidden fixed inset-0 bg-black/60 z-50 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white border-4 border-black w-full max-w-sm shadow-[12px_12px_0px_0px_rgba(0,0,0,1)]">
        <div class="bg-black text-white p-4 flex justify-between items-center border-b-4 border-black">
            <span class="text-sm font-black uppercase tracking-tighter">Новый узел доступа</span>
            <button onclick="closeAddKeyModal()" class="text-xl font-black hover:text-gray-400">✕</button>
        </div>
        
        <form id="add-key-form" class="p-6 space-y-5">
            <div>
                <label class="block text-[11px] font-black uppercase mb-1">Название аккаунта</label>
                <input type="text" id="key_name" required class="w-full border-2 border-black p-3 text-sm focus:outline-none focus:bg-zinc-50 font-bold uppercase">
            </div>
            <div>
                <label class="block text-[11px] font-black uppercase mb-1">ID Аккаунта</label>
                <input type="text" id="api_id_val" required class="w-full border-2 border-black p-3 text-sm focus:outline-none focus:bg-zinc-50">
            </div>
            <div>
                <label class="block text-[11px] font-black uppercase mb-1">API Ключ (Secret Key)</label>
                <input type="password" id="api_key_val" required class="w-full border-2 border-black p-3 text-sm focus:outline-none focus:bg-zinc-50">
            </div>
            <button type="submit" class="w-full bg-black text-white py-4 text-sm font-black uppercase hover:invert transition-all">
                Сохранить
            </button>
        </form>
    </div>
</div>

<script>
    function openAddKeyModal() {
        document.getElementById('modal-overlay').classList.remove('hidden');
        document.addEventListener('keydown', handleEscClose);
    }

    document.getElementById('add-key-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            key_name: document.getElementById('key_name').value,
            api_id: document.getElementById('api_id_val').value,
            key: document.getElementById('api_key_val').value
        };

        const response = await fetch('/api/v1/admin/keys', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-TG-Init-Data': window.Telegram.WebApp.initData
            },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            closeAddKeyModal();
            if (typeof loadApiKeys === 'function') loadApiKeys();
        }else {
            alert('Ошибка при сохранении.')
        }
    });

    function closeAddKeyModal() {
        smartCloseModal('modal-overlay');
    }
</script>

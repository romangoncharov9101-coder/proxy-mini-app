<div id="admin-proxy-detail-modal" class="modal-overlay hidden fixed inset-0 bg-black/70 z-[65] flex items-end justify-center">
    <div class="bg-white border-t-4 border-black w-full max-w-md shadow-[0_-8px_0px_0px_rgba(0,0,0,1)] max-h-[85vh] flex flex-col">
        <div class="bg-black text-white px-4 py-3 flex justify-between items-center shrink-0">
            <span class="text-[10px] font-black tracking-widest">ПРОКСИ — СИСТЕМНАЯ ИНФОРМАЦИЯ</span>
            <button onclick="smartCloseModal('admin-proxy-detail-modal')" class="text-xl font-black">×</button>
        </div>
        <div id="admin-proxy-detail-body" class="overflow-y-auto no-scrollbar p-4 space-y-4 flex-1">
            <div class="text-center py-10 animate-pulse text-[9px] font-black text-gray-400">ЗАГРУЗКА...</div>
        </div>
    </div>
</div>
<script>
async function openAdminProxyDetail(proxyId) {
    const modal = document.getElementById('admin-proxy-detail-modal');
    const body  = document.getElementById('admin-proxy-detail-body');
    body.innerHTML = '<div class="text-center py-10 animate-pulse text-[9px] font-black text-gray-400">ЗАГРУЗКА...</div>';
    modal.classList.remove('hidden');

    try {
        const res = await fetch(`/api/v1/admin/proxies/${proxyId}`, { headers: { 'X-TG-Init-Data': TG_INIT } });
        if (!res.ok) throw new Error(res.status);
        const p = await res.json();
        renderAdminProxyDetail(body, p);
    } catch(e) {
        body.innerHTML = '<div class="text-red-500 text-[9px] font-black text-center py-6">ОШИБКА ЗАГРУЗКИ</div>';
    }
}

function renderAdminProxyDetail(container, p) {
    const expires  = p.expires_at  ? new Date(p.expires_at).toLocaleString('ru-RU')  : '—';
    const bought   = p.purchased_at? new Date(p.purchased_at).toLocaleString('ru-RU') : '—';
    const renewal  = p.renewal_at  ? new Date(p.renewal_at).toLocaleString('ru-RU')  : '—';

    const nameStr = String(p.api_key_name || '—');
    const displayName = nameStr.length > 40 ? nameStr.slice(0, 37) + '...' : nameStr;

    container.innerHTML = `
        <!-- Статус + хост -->
        <div class="border-2 border-black p-3 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] space-y-1">
            <div class="flex justify-between items-center">
                <span class="text-[11px] font-black">${p.host}:${p.port}</span>
                <div class="flex items-center gap-1">
                    <div class="w-2 h-2 ${p.is_active ? 'bg-green-500' : 'bg-zinc-300'} border border-black"></div>
                    <span class="text-[9px] font-bold">${p.is_active ? 'АКТИВЕН' : 'НЕАКТИВЕН'}</span>
                </div>
            </div>
            <div class="text-[8px] font-bold text-gray-400">${p.type} • ${p.ip_version} • ${(p.ip_type).replace('_',' ')}</div>
            <div class="text-[9px] font-bold text-gray-500">
                Страна прокси: ${p.checked_location || '—'} 
                (${p.location_match ? 'совпадает' : 'не совпадает'})
            </div>
        </div>

        <!-- Владелец и ключ -->
        <div class="border-2 border-black p-3 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] space-y-1">
            <div class="text-[9px] font-black text-gray-400 mb-1">СИСТЕМНАЯ ИНФОРМАЦИЯ</div>
            <div class="flex justify-between text-[9px]"><span class="font-bold text-gray-400">ВЛАДЕЛЕЦ</span><span class="font-black">${p.owner_username||'—'} ${p.owner_tg_id ? '('+p.owner_tg_id+')' : ''}</span></div>
            <div class="flex justify-between text-[9px]"><span class="font-bold text-gray-400">API КЛЮЧ</span><span class="font-black">${displayName||'—'}</span></div>
            <div class="flex justify-between text-[9px]"><span class="font-bold text-gray-400">РЕГИОН ID</span><span class="font-black">${p.area_id||'—'}</span></div>
            <div class="flex justify-between text-[9px]"><span class="font-bold text-gray-400">PROXY_ID</span><span class="font-black">${p.ipfoxy_proxy_id||'—'}</span></div>
            <div class="flex justify-between text-[9px]"><span class="font-bold text-gray-400">ORDER_ID</span><span class="font-black">${p.ipfoxy_order_id||'—'}</span></div>
        </div>

        <!-- Учётные данные -->
        <div class="border-2 border-black p-3 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] space-y-1">
            <div class="text-[9px] font-black text-gray-400 mb-1">УЧЁТНЫЕ ДАННЫЕ</div>
            <div class="flex justify-between text-[9px]"><span class="font-bold text-gray-400">ЛОГИН</span><span class="font-mono normal-case font-black">${p.username||'—'}</span></div>
            <div class="flex justify-between text-[9px] items-center">
                <span class="font-bold text-gray-400">ПАРОЛЬ</span>
                <div class="flex gap-2 items-center">
                    <span class="font-mono normal-case font-black" id="adm-pwd-${p.id}">••••••••</span>
                    <button onclick="document.getElementById('adm-pwd-${p.id}').innerText = document.getElementById('adm-pwd-${p.id}').innerText === '••••••••' ? '${p.password||''}' : '••••••••'"
                        class="text-[7px] border border-black px-1 py-0.5 hover:bg-black hover:text-white transition-all">ПОКАЗ</button>
                </div>
            </div>
        </div>

        <!-- Временные метки -->
        <div class="border-2 border-black p-3 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] space-y-1">
            <div class="text-[9px] font-black text-gray-400 mb-1">ВРЕМЕННЫЕ МЕТКИ</div>
            <div class="flex justify-between text-[9px]"><span class="font-bold text-gray-400">КУПЛЕНО</span><span class="font-black">${bought}</span></div>
            <div class="flex justify-between text-[9px]"><span class="font-bold text-gray-400">ИСТЕКАЕТ</span><span class="font-black">${expires}</span></div>
            <div class="flex justify-between text-[9px]"><span class="font-bold text-gray-400">ПРОДЛЕНИЕ</span><span class="font-black">${renewal}</span></div>
        </div>

        <!-- Автопродление -->
        <div class="border-2 border-black p-3 flex justify-between items-center">
            <span class="text-[10px] font-black">АВТОПРОДЛЕНИЕ</span>
            <button id="adm-auto-extend-${p.id}"
                onclick="adminToggleAutoExtend(${p.id}, ${!p.auto_extend})"
                class="border-2 border-black px-4 py-2 text-[9px] font-black transition-all ${p.auto_extend ? 'bg-black text-white' : 'bg-white hover:bg-zinc-100'}">
                ${p.auto_extend ? 'ВКЛ' : 'ВЫКЛ'}
            </button>
        </div>

        <!-- Активность прокси -->
        <div class="border-2 border-black p-3 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">
            <div class="flex items-center justify-between mb-2">
                <div>
                    <div class="text-[10px] font-black">СТАТУС ПРОКСИ</div>
                    <div class="text-[8px] text-gray-400 font-bold normal-case">
                        Активировать или отключить прокси в системе
                    </div>
                </div>
                <span id="adm-active-saving-${p.id}" class="text-[8px] font-black text-gray-400 hidden">СОХРАНЕНИЕ...</span>
            </div>

            <div class="flex gap-2">
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="adm_active_${p.id}" value="true"
                        ${p.is_active ? 'checked' : ''}
                        onchange="adminSetProxyActive(${p.id}, true)"
                        class="sr-only peer">
                    <div class="border-2 border-black py-2 text-center text-[9px] font-black transition-all peer-checked:bg-black peer-checked:text-white hover:bg-zinc-100 peer-checked:hover:bg-black">
                        АКТИВЕН
                    </div>
                </label>

                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="adm_active_${p.id}" value="false"
                        ${!p.is_active ? 'checked' : ''}
                        onchange="adminSetProxyActive(${p.id}, false)"
                        class="sr-only peer">
                    <div class="border-2 border-black py-2 text-center text-[9px] font-black transition-all peer-checked:bg-black peer-checked:text-white hover:bg-zinc-100 peer-checked:hover:bg-black">
                        ОТКЛЮЧЕН
                    </div>
                </label>
            </div>
        </div>
    `;
}

async function adminToggleAutoExtend(proxyId, newValue) {
    const btn = document.getElementById('adm-auto-extend-' + proxyId);
    if (btn) { btn.disabled = true; btn.innerText = '...'; }
    try {
        const res = await fetch(`/api/v1/user/proxies/${proxyId}/auto-extend`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'X-TG-Init-Data': TG_INIT },
            body: JSON.stringify({ auto_extend: newValue })
        });
        if (!res.ok) throw new Error(res.status);
        if (btn) {
            btn.innerText = newValue ? 'ВКЛ' : 'ВЫКЛ';
            btn.className = `border-2 border-black px-4 py-2 text-[9px] font-black transition-all ${newValue ? 'bg-black text-white' : 'bg-white hover:bg-zinc-100'}`;
            btn.onclick = () => adminToggleAutoExtend(proxyId, !newValue);
            btn.disabled = false;
        }
    } catch(e) {
        window.Telegram.WebApp.showAlert('ОШИБКА');
        if (btn) { btn.disabled = false; }
    }
}

async function adminSetProxyActive(proxyId, newValue) {
    const saving = document.getElementById('adm-active-saving-' + proxyId);
    if (saving) saving.classList.remove('hidden');

    try {
        const res = await fetch(`/api/v1/admin/proxies/${proxyId}/active`, {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
                'X-TG-Init-Data': TG_INIT
            },
            body: JSON.stringify({
                is_active: newValue
            })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || 'Ошибка сохранения');

        if (typeof resetAndReloadAdminProxies === 'function') {
            resetAndReloadAdminProxies();
        }

    } catch (e) {
        window.Telegram?.WebApp?.showAlert?.('ОШИБКА СОХРАНЕНИЯ СТАТУСА');

        const rollbackValue = newValue ? 'false' : 'true';
        const rollbackRadio = document.querySelector(
            `input[name="adm_active_${proxyId}"][value="${rollbackValue}"]`
        );

        if (rollbackRadio) rollbackRadio.checked = true;
    } finally {
        if (saving) saving.classList.add('hidden');
    }
}
</script>

<!-- МОДАЛ: Детали пользователя -->
<div id="user-detail-modal" class="modal-overlay hidden fixed inset-0 bg-black/70 z-[65] flex items-end justify-center">
    <div class="bg-white border-t-4 border-black w-full max-w-md shadow-[0_-8px_0px_0px_rgba(0,0,0,1)] max-h-[90vh] flex flex-col">
        <div class="bg-black text-white px-4 py-3 flex justify-between items-center shrink-0">
            <span class="text-[10px] font-black tracking-widest">ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ</span>
            <button onclick="smartCloseModal('user-detail-modal')" class="text-xl font-black">×</button>
        </div>
        <div id="user-detail-body" class="overflow-y-auto no-scrollbar p-4 space-y-4 flex-1">
            <div class="text-center py-10 animate-pulse text-[9px] font-black text-gray-400">ЗАГРУЗКА...</div>
        </div>
    </div>
</div>

<!-- МОДАЛ: Назначить ключ пользователю -->
<div id="assign-key-modal" class="modal-overlay hidden fixed inset-0 bg-black/60 z-[75] flex items-center justify-center p-4">
    <div class="bg-white border-4 border-black w-full max-w-sm shadow-[12px_12px_0px_0px_rgba(0,0,0,1)]">
        <div class="bg-black text-white p-4 flex justify-between items-center">
            <span class="text-[10px] font-black tracking-widest">НАЗНАЧИТЬ КЛЮЧ</span>
            <button onclick="smartCloseModal('assign-key-modal')" class="text-xl font-black">×</button>
        </div>
        <div class="p-5 space-y-4">
            <input type="hidden" id="assign_user_id">
            <div>
                <label class="block text-[9px] font-black uppercase mb-1">API Ключ</label>
                <select id="assign_key_select" class="w-full border-2 border-black p-3 text-[10px] font-bold focus:outline-none bg-white uppercase">
                    <option value="">— загрузка... —</option>
                </select>
            </div>
            <button onclick="doAssignKey()" class="w-full bg-black text-white py-3 text-[10px] font-black uppercase hover:invert transition-all">
                НАЗНАЧИТЬ
            </button>
        </div>
    </div>
</div>

<script>
async function openUserDetail(userId) {
    const modal = document.getElementById('user-detail-modal');
    const body  = document.getElementById('user-detail-body');
    body.innerHTML = '<div class="text-center py-10 animate-pulse text-[9px] font-black text-gray-400">ЗАГРУЗКА...</div>';
    modal.classList.remove('hidden');

    try {
        const [proxiesRes, txRes] = await Promise.all([
            fetch(`/api/v1/admin/proxies?owner_id=${userId}&limit=5`, { headers: { 'X-TG-Init-Data': TG_INIT } }),
            fetch(`/api/v1/admin/transactions?user_id=${userId}&limit=5`, { headers: { 'X-TG-Init-Data': TG_INIT } })
        ]);
        const usersRes = await fetch(`/api/v1/admin/users?limit=100`, { headers: { 'X-TG-Init-Data': TG_INIT } });
        const allUsers = await usersRes.json();
        const user = allUsers.find(u => u.id === userId);
        const proxData = await proxiesRes.json();
        const txData   = await txRes.json();
        renderUserDetail(body, user, proxData.items||[], txData.items||[]);
    } catch(e) {
        body.innerHTML = '<div class="text-red-500 text-[9px] font-black text-center py-6">ОШИБКА ЗАГРУЗКИ</div>';
    }
}

function renderUserDetail(container, u, proxies, txs) {
    if (!u) { container.innerHTML = '<div class="text-[9px] font-black text-center py-6">ПОЛЬЗОВАТЕЛЬ НЕ НАЙДЕН</div>'; return; }
    const name = u.first_name || u.username || 'USER_'+u.telegram_id;

    const nameStr = String(u.api_key_name || '—');
    const displayName = nameStr.length > 40 ? nameStr.slice(0, 37) + '...' : nameStr;

    container.innerHTML = `
        <!-- Профиль -->
        <div class="border-2 border-black p-3 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] space-y-1">
            <div class="flex justify-between items-center">
                <span class="text-[11px] font-black">${name.toUpperCase()}</span>
                <span class="text-[8px] font-black border border-black px-1.5 py-0.5">${u.role.toUpperCase()}</span>
            </div>
            <div class="text-[8px] font-bold text-gray-400">TG_ID: ${u.telegram_id}</div>
            <div class="text-[8px] font-bold text-gray-400">КЛЮЧ: ${displayName ||'НЕ НАЗНАЧЕН'}</div>
        </div>

        <!-- Действия -->
        <div class="grid grid-cols-2 gap-2">
            <button onclick="openAssignKeyModal(${u.id})" class="border-2 border-black py-2 text-[9px] font-black hover:bg-zinc-100 transition-all">
                НАЗНАЧИТЬ КЛЮЧ
            </button>
            <button onclick="smartCloseModal('user-detail-modal'); blockUser(${u.id},'${name}')"
                class="border-2 border-black py-2 text-[9px] font-black hover:bg-red-500 hover:text-white transition-all">
                ЗАБЛОКИРОВАТЬ
            </button>
        </div>

        <!-- Прокси -->
        <div>
            <div class="text-[9px] font-black text-gray-400 mb-2 border-b border-zinc-100 pb-1">ПОСЛЕДНИЕ ПРОКСИ (${proxies.length})</div>
            ${proxies.length ? proxies.map(p => `
                <div class="border border-zinc-200 p-2 mb-1 text-[8px] font-bold flex justify-between">
                    <span>${p.host}:${p.port}</span>
                    <span class="${p.is_active ? 'text-green-600' : 'text-zinc-400'}">${p.is_active ? 'АКТИВЕН' : 'НЕАКТИВЕН'}</span>
                </div>`).join('') :
                '<div class="text-[8px] text-gray-300 font-black py-2">НЕТ ПРОКСИ</div>'}
        </div>

        <!-- Транзакции -->
        <div>
            <div class="text-[9px] font-black text-gray-400 mb-2 border-b border-zinc-100 pb-1">ПОСЛЕДНИЕ ТРАНЗАКЦИИ (${txs.length})</div>
            ${txs.length ? txs.map(tx => `
                <div class="border border-zinc-200 p-2 mb-1 text-[8px] font-bold flex justify-between">
                    <span>${tx.type.toUpperCase()}</span>
                    <span>${parseFloat(tx.amount).toFixed(2)} USD</span>
                </div>`).join('') :
                '<div class="text-[8px] text-gray-300 font-black py-2">НЕТ ТРАНЗАКЦИЙ</div>'}
        </div>
    `;
}

async function openAssignKeyModal(userId) {
    document.getElementById('assign_user_id').value = userId;
    const sel = document.getElementById('assign_key_select');
    sel.innerHTML = '<option value="">— загрузка... —</option>';
    document.getElementById('assign-key-modal').classList.remove('hidden');
    try {
        const res = await fetch('/api/v1/admin/keys', { headers: { 'X-TG-Init-Data': TG_INIT } });
        const keys = await res.json();
        sel.innerHTML = '<option value="">— выберите ключ —</option>';
        keys.filter(k => k.is_active).forEach(k => {
            const opt = document.createElement('option');
            opt.value = k.id; opt.innerText = k.key_name + ' (' + parseFloat(k.balance||0).toFixed(2) + ' USD)';
            sel.appendChild(opt);
        });
    } catch(e) { sel.innerHTML = '<option>Ошибка загрузки</option>'; }
}

async function doAssignKey() {
    const userId = parseInt(document.getElementById('assign_user_id').value);
    const keyId  = parseInt(document.getElementById('assign_key_select').value);
    if (!keyId) { window.Telegram.WebApp.showAlert('ВЫБЕРИТЕ КЛЮЧ'); return; }
    const res = await fetch('/api/v1/admin/users/assign-key', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-TG-Init-Data': TG_INIT },
        body: JSON.stringify({ user_ids: [userId], key_id: keyId })
    });
    if (res.ok) {
        smartCloseModal('assign-key-modal');
        smartCloseModal('user-detail-modal');
        adminUsersState = { nextCursor: null, hasMore: true, isLoading: false };
        document.getElementById('admin-users-list').innerHTML = '';
        loadNextUsersPage();
    } else window.Telegram.WebApp.showAlert('ОШИБКА НАЗНАЧЕНИЯ');
}
</script>

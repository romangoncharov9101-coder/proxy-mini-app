<!DOCTYPE html>
<html lang="ru">
<head>

<div class="max-w-md mx-auto h-screen flex flex-col border-x border-black">

            <div class="flex items-center gap-3">

                <span class="text-[9px] font-black text-gray-400 tracking-widest">ОШИБКА АВТОРИЗАЦИИ</span>

                    Обратитесь к администратору для получения доступа.

        <div class="w-full space-y-2 text-[9px] font-black text-gray-300 border-t-2 border-gray-100 pt-4">

            <div class="flex justify-between"><span>STATUS</span><span class="text-red-500">FORBIDDEN</span></div>
            <div class="flex justify-between"><span>REASON</span><span>NOT_IN_WHITELIST</span></div>
        </div>
    </div>

    <div class="border-t-2 border-black p-4 bg-zinc-50">
        <p class="text-[9px] font-bold text-gray-400 text-center">
            ОТКРОЙТЕ ПРИЛОЖЕНИЕ ЧЕРЕЗ TELEGRAM-БОТ

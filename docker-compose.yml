services:
  # ─── Database (PostgreSQL) ──────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: proxy_db
    restart: always
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-proxyapp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxy_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-proxyapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: proxy_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - proxy_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI ────────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: proxy_api
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ROLE: api
      # В .env убедись, что хост базы теперь 'db', а не 'localhost'
    ports:
      - "8008:8000"
    volumes:
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxy_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    build: .
    container_name: proxy_worker
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ROLE: worker
    volumes:
      - app_logs:/app/logs
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxy_net

  # ─── Celery Beat ──────────────────────────────────────────────────────────
  beat:
    build: .
    container_name: proxy_beat
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ROLE: beat
    volumes:
      - app_logs:/app/logs
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxy_net

volumes:
  redis_data:
  app_logs:
  postgres_data:

networks:
  proxy_net:
    driver: bridge
services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: proxy_db
    restart: always
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-proxyapp}
    # Порт закрыт наружу — БД доступна только внутри Docker-сети
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxy_net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-proxyapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: proxy_redis
    restart: unless-stopped
    command: redis-server --bind 0.0.0.0 --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - proxy_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI ─────────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: proxy_api
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ROLE: api
      LOG_DIR: /app/logs
    ports:
      - "8008:8000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxy_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build: .
    container_name: proxy_worker
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ROLE: worker
      LOG_DIR: /app/logs
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxy_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Celery Beat ─────────────────────────────────────────────────────────────
  beat:
    build: .
    container_name: proxy_beat
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ROLE: beat
      LOG_DIR: /app/logs
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxy_net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  redis_data:
  postgres_data:

networks:
  proxy_net:
    driver: bridge